<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link href="https://lf-code-agent.coze.cn/obj/x-ai-cn/fonts/google/google-all-fonts.css" rel="stylesheet"/>

  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/jquery/jquery-3.7.1.min.js"></script>
  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/lucide/lucide-1.11.0.min.js"></script>
  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/tailwindcss/tailwindcss-browser-4.2.4.min.js"></script>

  <style type="text/tailwindcss">
    @theme {
      /* === 品牌色 === */
      --color-primary:              #B9975B;
      --color-primary-container:    #E8D9BE;
      --color-on-primary:           #FFFFFF;
      /* === 背景 / 表面 === */
      --color-background:                 #F8F4EC;
      --color-surface-container-lowest:   #FFFFFF;
      --color-surface:                    #FFFFFF;
      --color-surface-container:          #EFE9DC;
      --color-surface-container-high:     #E8E0D0;
      --color-surface-container-highest:  #DFD6C4;
      /* === 文字 === */
      --color-on-surface:           #1B1712;
      --color-on-surface-variant:   #7B7164;
      /* === 功能色 === */
      --color-success:  #22c55e;
      --color-error:    #ef4444;
      --color-warning:  #f59e0b;
      /* === 边框 === */
      --color-outline:          #C8BFA8;
      --color-outline-variant:  #DDD6C4;
      /* === 圆角 === */
      --radius-sm:   0.25rem;
      --radius-md:   0.375rem;
      --radius-lg:   0.5rem;
      --radius-xl:   0.75rem;
      --radius-2xl:  1rem;
      --radius-full: 9999px;
      /* === 阴影 === */
      --shadow-card:   0 2px 8px rgba(0,0,0,0.06);
      --shadow-float:  0 10px 25px rgba(0,0,0,0.08);
      --shadow-dialog: 0 25px 50px rgba(0,0,0,0.12);
      /* === 字体 === */
      --font-sans: "Noto Sans SC", system-ui, sans-serif;
      --font-serif: "Georgia", "Noto Serif SC", serif;
    }
  </style>

  <!-- 图片兜底 -->
  <script>
    document.addEventListener('error', function (e) {
      const img = e.target;
      if (img.tagName !== 'IMG' || img.dataset.fallback) return;
      img.dataset.fallback = '1';
      const esc = s => s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      const cat = img.getAttribute('data-category') || '其他';
      const alt = img.getAttribute('alt') || '';
      const label = esc(alt.length > 8 ? alt.slice(0, 8) + '…' : alt);
      const icons = { '人物': '👤', '自然风景': '🏞', '动物': '🐾', '建筑城市': '🏙', '运动体育': '⚽', '交通工具': '🚗', '食物': '🍽', '服饰时尚': '👗', '商业科技': '💼', '游戏娱乐': '🎮', '艺术': '🎨', '其他': '🖼' };
      const icon = icons[cat] || '🖼';
      const w = img.width || 400, h = img.height || 300;
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}"><rect width="100%" height="100%" fill="%23f3f4f6"/><text x="50%" y="45%" text-anchor="middle" font-size="${Math.min(w, h) * 0.18}" dominant-baseline="central">${icon}</text><text x="50%" y="68%" text-anchor="middle" font-size="${Math.min(w, h) * 0.07}" fill="%239ca3af" font-family="system-ui,sans-serif" dominant-baseline="central">${label}</text></svg>`;
      img.src = 'data:image/svg+xml,' + svg;
    }, true);
  </script>
</head>

<body class="bg-background text-on-surface font-sans">

  <!-- @nav:start 导航组件，不需要的页面则不要复制此段 -->
  <header class="bg-surface sticky top-0 z-40 h-16 flex items-center justify-between border-b border-outline-variant/20">
    <div class="w-full max-w-5xl mx-auto px-6 flex items-center justify-between">
      <a href="home.html" class="flex items-center gap-2.5">
        <i data-lucide="music" class="text-primary w-5 h-5"></i>
        <span class="font-serif font-bold text-lg text-on-surface">声乐性格测试</span>
      </a>
      <nav class="flex items-center gap-1">
        <a href="home.html" class="px-3 py-1.5 text-sm font-medium text-on-surface-variant hover:text-on-surface hover:bg-surface-container rounded-md transition-colors">首页</a>
        <a href="test.html" class="px-3 py-1.5 text-sm font-medium text-on-surface-variant hover:text-on-surface hover:bg-surface-container rounded-md transition-colors">开始测试</a>
      </nav>
    </div>
  </header>
  <!-- @nav:end 导航组件，不需要的页面则不要复制此段 -->

  <main class="max-w-4xl mx-auto px-6 py-8">
    <!-- @main-content:start -->
    <!-- @main-content:end -->
  </main>

  <script>lucide.createIcons();</script>
</body>

</html>
